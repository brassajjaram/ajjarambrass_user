<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Ajjaram Brass Products</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="products.css">
</head>

<body>

  <!-- =================================
       FULL PRODUCTS PAGE SHIMMER
  ================================= -->

  <div
    class="page-shimmer-loader products-page-shimmer"
    id="pageShimmerLoader"
    aria-hidden="true"
  >

    <!-- Shimmer header -->

    <header class="products-shimmer-header">

      <div class="products-shimmer-header-container">

        <div class="products-shimmer-logo">

          <div class="products-shimmer-logo-main"></div>

          <div class="products-shimmer-logo-sub"></div>

        </div>

        <div class="products-shimmer-search"></div>

        <div class="products-shimmer-actions">

          <div class="products-shimmer-action">

            <div class="products-shimmer-action-circle"></div>

            <div class="products-shimmer-action-name"></div>

          </div>

          <div class="products-shimmer-action">

            <div class="products-shimmer-action-circle"></div>

            <div class="products-shimmer-action-name"></div>

          </div>

        </div>

      </div>

    </header>

    <!-- Shimmer main layout -->

    <main class="products-shimmer-layout">

      <!-- Categories shimmer -->

      <aside class="products-shimmer-sidebar">

        <div class="products-shimmer-sidebar-title"></div>

        <div class="products-shimmer-category">

          <div class="products-shimmer-category-image"></div>

          <div class="products-shimmer-category-name"></div>

        </div>

        <div class="products-shimmer-category">

          <div class="products-shimmer-category-image"></div>

          <div class="products-shimmer-category-name"></div>

        </div>

        <div class="products-shimmer-category">

          <div class="products-shimmer-category-image"></div>

          <div class="products-shimmer-category-name"></div>

        </div>

        <div class="products-shimmer-category">

          <div class="products-shimmer-category-image"></div>

          <div class="products-shimmer-category-name"></div>

        </div>

        <div class="products-shimmer-category">

          <div class="products-shimmer-category-image"></div>

          <div class="products-shimmer-category-name"></div>

        </div>

        <div class="products-shimmer-category">

          <div class="products-shimmer-category-image"></div>

          <div class="products-shimmer-category-name"></div>

        </div>

      </aside>

      <!-- Products content shimmer -->

      <section class="products-shimmer-content">

        <div class="products-shimmer-heading">

          <div class="products-shimmer-heading-title"></div>

          <div class="products-shimmer-back"></div>

        </div>

        <div class="products-shimmer-grid">

          <article class="products-shimmer-card">

            <div class="products-shimmer-card-image">

              <div class="products-shimmer-rating"></div>

            </div>

            <div class="products-shimmer-card-info">

              <div class="products-shimmer-card-name"></div>

              <div class="products-shimmer-card-price"></div>

            </div>

          </article>

          <article class="products-shimmer-card">

            <div class="products-shimmer-card-image">

              <div class="products-shimmer-rating"></div>

            </div>

            <div class="products-shimmer-card-info">

              <div class="products-shimmer-card-name"></div>

              <div class="products-shimmer-card-price"></div>

            </div>

          </article>

          <article class="products-shimmer-card">

            <div class="products-shimmer-card-image">

              <div class="products-shimmer-rating"></div>

            </div>

            <div class="products-shimmer-card-info">

              <div class="products-shimmer-card-name"></div>

              <div class="products-shimmer-card-price"></div>

            </div>

          </article>

          <article class="products-shimmer-card">

            <div class="products-shimmer-card-image">

              <div class="products-shimmer-rating"></div>

            </div>

            <div class="products-shimmer-card-info">

              <div class="products-shimmer-card-name"></div>

              <div class="products-shimmer-card-price"></div>

            </div>

          </article>

          <article class="products-shimmer-card">

            <div class="products-shimmer-card-image">

              <div class="products-shimmer-rating"></div>

            </div>

            <div class="products-shimmer-card-info">

              <div class="products-shimmer-card-name"></div>

              <div class="products-shimmer-card-price"></div>

            </div>

          </article>

          <article class="products-shimmer-card">

            <div class="products-shimmer-card-image">

              <div class="products-shimmer-rating"></div>

            </div>

            <div class="products-shimmer-card-info">

              <div class="products-shimmer-card-name"></div>

              <div class="products-shimmer-card-price"></div>

            </div>

          </article>

          <article class="products-shimmer-card">

            <div class="products-shimmer-card-image">

              <div class="products-shimmer-rating"></div>

            </div>

            <div class="products-shimmer-card-info">

              <div class="products-shimmer-card-name"></div>

              <div class="products-shimmer-card-price"></div>

            </div>

          </article>

          <article class="products-shimmer-card">

            <div class="products-shimmer-card-image">

              <div class="products-shimmer-rating"></div>

            </div>

            <div class="products-shimmer-card-info">

              <div class="products-shimmer-card-name"></div>

              <div class="products-shimmer-card-price"></div>

            </div>

          </article>

        </div>

      </section>

    </main>

  </div>

  <!-- =================================
       NORMAL PRODUCTS PAGE
  ================================= -->

  <header class="header">
    <div class="header-container">

      <!-- Logo -->

      <a
        href="index.html"
        class="logo"
        aria-label="Home"
      >
        <span class="logo-main">
          AJJARAM
        </span>

        <span class="logo-sub">
          Brass &amp; Sources
        </span>
      </a>

      <!-- Live product search -->

      <div class="header-search-wrapper">

        <form
          class="search-form"
          id="productsSearchForm"
          autocomplete="off"
        >
          <input
            type="search"
            id="productsSearchInput"
            placeholder="Search products..."
            aria-label="Search products"
            aria-controls="productsSearchSuggestions"
            aria-expanded="false"
          >

          <button
            type="submit"
            aria-label="Search"
          >
            <svg viewBox="0 0 24 24">

              <circle
                cx="11"
                cy="11"
                r="7"
              ></circle>

              <path
                d="M20 20L16.5 16.5"
              ></path>

            </svg>
          </button>
        </form>

        <!-- Live search dropdown -->

        <div
          class="search-suggestions"
          id="productsSearchSuggestions"
          hidden
        >
          <div
            class="search-suggestions-list"
            id="productsSearchSuggestionsList"
          ></div>

          <p
            class="search-suggestions-message"
            id="productsSearchSuggestionsMessage"
            aria-live="polite"
          ></p>
        </div>

      </div>

      <!-- Orders and profile -->

      <div class="header-actions">

        <!-- My Orders -->

        <div class="header-action-item">

          <button
            class="header-action-button"
            type="button"
            aria-label="My Orders"
            onclick="window.location.href='orders.html'"
          >
            <svg viewBox="0 0 24 24">

              <rect
                x="5"
                y="3"
                width="14"
                height="18"
                rx="2"
              ></rect>

              <path d="M8 8H16"></path>

              <path d="M8 12H16"></path>

              <path d="M8 16H13"></path>

            </svg>
          </button>

          <span class="header-action-name">
            My Orders
          </span>

        </div>

        <!-- Profile -->

        <div class="header-action-item">

          <button
            class="header-action-button"
            id="profileButton"
            type="button"
            aria-label="Profile"
          >
            <svg viewBox="0 0 24 24">

              <circle
                cx="12"
                cy="8"
                r="4"
              ></circle>

              <path
                d="M4 21C4 16.5 7.5 14 12 14C16.5 14 20 16.5 20 21"
              ></path>

            </svg>
          </button>

          <span class="header-action-name">
            Profile
          </span>

        </div>

      </div>

    </div>
  </header>

  <main class="catalog-layout">

    <!-- Categories -->

    <aside class="category-sidebar">

      <h2>Categories</h2>

      <button
        class="category-item active"
        type="button"
        data-category="all"
      >
        <img
          src="images/elephant.png"
          alt=""
        >

        <span>All Products</span>
      </button>

      <button
        class="category-item"
        type="button"
        data-category="pooja"
      >
        <img
          src="images/diya.png"
          alt=""
        >

        <span>Pooja Items</span>
      </button>

      <button
        class="category-item"
        type="button"
        data-category="kitchen"
      >
        <img
          src="images/dinner set.png"
          alt=""
        >

        <span>Kitchen Items</span>
      </button>

      <button
        class="category-item"
        type="button"
        data-category="idols"
      >
        <img
          src="images/krishna.png"
          alt=""
        >

        <span>Brass Idols</span>
      </button>

      <button
        class="category-item"
        type="button"
        data-category="decor"
      >
        <img
          src="images/flower-vase.png"
          alt=""
        >

        <span>Home Décor</span>
      </button>

      <button
        class="category-item"
        type="button"
        data-category="gifting"
      >
        <img
          src="images/swan.png"
          alt=""
        >

        <span>Gifting</span>
      </button>

    </aside>

    <!-- Products -->

    <section class="catalog-content">

      <div class="catalog-heading">

        <div>

          <h1 id="catalogTitle">
            All Products
          </h1>

        </div>

        <button
          class="catalog-back-button"
          type="button"
          onclick="window.location.href='index.html'"
          aria-label="Back to home"
        >
          Back
        </button>

      </div>

      <p
        class="catalog-message"
        id="catalogMessage"
        aria-live="polite"
      ></p>

      <div
        class="catalog-grid"
        id="catalogGrid"
      ></div>

    </section>

  </main>

  <div
    class="cart-toast"
    id="cartToast"
    aria-live="polite"
  ></div>

  <!-- Profile overlay -->

  <div
    class="profile-sheet-overlay"
    id="profileSheetOverlay"
    hidden
  ></div>

  <!-- Profile bottom sheet -->

  <section
    class="profile-bottom-sheet"
    id="profileBottomSheet"
    aria-hidden="true"
    aria-labelledby="profileSheetTitle"
  >

    <div class="profile-sheet-handle"></div>

    <div class="profile-sheet-header">

      <div>

        <p class="profile-sheet-label">
          My Account
        </p>

        <h2 id="profileSheetTitle">
          Profile Details
        </h2>

      </div>

      <button
        class="profile-sheet-close"
        id="profileSheetClose"
        type="button"
        aria-label="Close profile"
      >
        &times;
      </button>

    </div>

    <!-- Profile loading -->

    <div
      class="profile-sheet-loading"
      id="profileSheetLoading"
    >
      Loading profile...
    </div>

    <!-- Logged-in user -->

    <div
      class="profile-user-content"
      id="profileUserContent"
      hidden
    >

      <div class="profile-avatar">

        <span id="profileAvatarLetter">
          U
        </span>

      </div>

      <div class="profile-user-heading">

        <h3 id="profileUserName">
          User
        </h3>

        <p id="profileUserStatus">
          Logged in
        </p>

      </div>

      <div class="profile-details-list">

        <div class="profile-detail-row">

          <span class="profile-detail-label">
            Phone
          </span>

          <strong id="profileUserPhone">
            Not available
          </strong>

        </div>

        <div class="profile-detail-row">

          <span class="profile-detail-label">
            Customer ID
          </span>

          <strong
            class="profile-customer-code"
            id="profileCustomerCode"
          >
            ------
          </strong>

        </div>

      </div>

      <button
        class="profile-logout-button"
        id="profileLogoutButton"
        type="button"
      >
        Logout
      </button>

      <p
        class="profile-sheet-message"
        id="profileSheetMessage"
        aria-live="polite"
      ></p>

    </div>

    <!-- Guest user -->

    <div
      class="profile-guest-content"
      id="profileGuestContent"
      hidden
    >

      <div class="profile-avatar">
        <span>?</span>
      </div>

      <h3>
        You are not logged in
      </h3>

      <p>
        Login to view your profile and saved account details.
      </p>

      <button
        class="profile-login-button"
        id="profileLoginButton"
        type="button"
      >
        Login
      </button>

    </div>

  </section>

  <script src="page-loader.js"></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script src="supabase-config.js"></script>

  <script src="script.js"></script>

  <script src="products.js"></script>

</body>
</html>
