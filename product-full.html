<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Ajjaram Brass Product</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="product-full.css">
</head>

<body>

  <!-- =================================
       PAGE LOADER
  ================================= -->

  <div
    class="product-page-loader"
    id="productPageLoader"
    aria-hidden="true"
  >

    <div class="product-page-loader-content">

      <div class="product-loader-image"></div>

      <div class="product-loader-info">

        <div class="product-loader-small"></div>

        <div class="product-loader-title"></div>

        <div class="product-loader-text"></div>

        <div class="product-loader-text short"></div>

        <div class="product-loader-price"></div>

        <div class="product-loader-benefits">

          <div></div>

          <div></div>

          <div></div>

        </div>

      </div>

    </div>

  </div>

  <!-- =================================
       PRODUCT DETAILS PAGE
  ================================= -->

  <main class="product-details-page">

    <!-- =================================
         LEFT: PRODUCT IMAGE SLIDER
    ================================= -->

    <section
      class="product-large-image product-slider"
      id="productSlider"
      aria-label="Product images"
    >

      <button
        class="product-close-button"
        type="button"
        aria-label="Back to products"
        onclick="window.location.href='products.html'"
      >
        &times;
      </button>

      <div
        class="product-slider-track"
        id="productSliderTrack"
      >

        <div class="product-slide">

          <img
            class="product-slide-image"
            src=""
            alt=""
            draggable="false"
          >

        </div>

        <div class="product-slide">

          <img
            class="product-slide-image"
            src=""
            alt=""
            draggable="false"
          >

        </div>

        <div class="product-slide">

          <img
            class="product-slide-image"
            src=""
            alt=""
            draggable="false"
          >

        </div>

      </div>

      <div class="product-slider-dots">

        <button
          class="product-slider-dot active"
          type="button"
          data-slide="0"
          aria-label="Show image 1"
        ></button>

        <button
          class="product-slider-dot"
          type="button"
          data-slide="1"
          aria-label="Show image 2"
        ></button>

        <button
          class="product-slider-dot"
          type="button"
          data-slide="2"
          aria-label="Show image 3"
        ></button>

      </div>

    </section>

    <!-- =================================
         RIGHT COLUMN
    ================================= -->

    <div class="product-right-column">

      <!-- =================================
           PRODUCT INFORMATION CARD
      ================================= -->

      <section class="product-main-info">

        <!-- Product title and rating -->

        <div class="product-title-row">

          <div>

            <p
              class="product-category"
              id="productCategory"
            ></p>

            <h1 id="productName"></h1>

          </div>

          <span class="product-rating">

            ★

            <span id="productRating"></span>

          </span>

        </div>

        <!-- Short description -->

        <p
          class="product-short-description"
          id="productShortDescription"
        ></p>

        <!-- Product price -->

        <div class="product-price-row">

          <span
            class="product-price"
            id="productPrice"
          ></span>

          <span
            class="product-old-price"
            id="productOldPrice"
          ></span>

          <span
            class="product-discount"
            id="productDiscount"
          ></span>

        </div>

        <!-- Delivery message -->

        <p class="product-delivery">
          🚚 Delivery in 5–7 days
        </p>

        <!-- =================================
             BENEFITS ABOVE PRODUCT DETAILS
        ================================= -->

        <div class="product-benefits">

          <!-- Verified quality -->

          <div class="benefit-card">

            <img
              class="benefit-icon-image"
              src="images/icons8-guarantee-50.png"
              alt="Verified quality"
            >

            <span>
              Verified Quality
            </span>

          </div>

          <!-- Free delivery -->

          <div class="benefit-card">

            <img
              class="benefit-icon-image"
              src="images/icons8-fast-delivery-64.png"
              alt="Free delivery"
            >

            <span>
              Free Delivery
            </span>

          </div>

          <!-- Easy returns -->

          <div class="benefit-card">

            <img
              class="benefit-icon-image"
              src="images/icons8-easy-50.png"
              alt="Easy returns"
            >

            <span>
              Easy Returns
            </span>

          </div>

        </div>

        <!-- =================================
             PRODUCT DETAILS
        ================================= -->

        <div class="product-details-inline">

          <h2>
            Product Details
          </h2>

          <p
            class="product-description"
            id="productDescription"
          ></p>

        </div>

      </section>

      <!-- =================================
           CART CONTROLS
      ================================= -->

      <section class="product-lower-section">

        <div class="product-cart-bar">

          <div class="product-purchase-row">

            <!-- Add to cart -->

            <button
              class="product-add-to-cart"
              id="productAddToCart"
              type="button"
            >
              Add to Cart
            </button>

            <!-- Quantity control -->

            <div
              class="product-quantity-control"
              id="productQuantityControl"
              hidden
            >

              <button
                class="quantity-button"
                id="decreaseQuantity"
                type="button"
                aria-label="Decrease quantity"
              >
                −
              </button>

              <span
                class="quantity-value"
                id="productQuantity"
              >
                1
              </span>

              <button
                class="quantity-button"
                id="increaseQuantity"
                type="button"
                aria-label="Increase quantity"
              >
                +
              </button>

            </div>

            <!-- Cart icon -->

            <button
              class="product-cart-icon"
              id="productCartIcon"
              type="button"
              aria-label="Open cart"
              onclick="window.location.href='cart.html'"
              hidden
            >

              <svg
                viewBox="0 0 24 24"
                aria-hidden="true"
              >

                <circle
                  cx="9"
                  cy="20"
                  r="1.5"
                ></circle>

                <circle
                  cx="18"
                  cy="20"
                  r="1.5"
                ></circle>

                <path
                  d="M3 4H5L7.2 15H18.5L21 8H6"
                ></path>

              </svg>

              <span
                class="cart-item-count"
                id="cartItemCount"
              >
                0
              </span>

            </button>

          </div>

        </div>

      </section>

    </div>

  </main>

  <!-- =================================
       SCRIPTS
  ================================= -->

  <script src="page-loader.js"></script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <script src="supabase-config.js"></script>

  <script src="product-full.js"></script>

</body>
</html>
